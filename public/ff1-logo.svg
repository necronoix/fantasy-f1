<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CC0000"/>
      <stop offset="50%" stop-color="#E8002D"/>
      <stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
    <linearGradient id="speedLines" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8002D" stop-opacity="0"/>
      <stop offset="30%" stop-color="#E8002D" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E8002D"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#E8002D" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- === SPEED LINES (left side, behind car) === -->
  <g opacity="0.6">
    <rect x="80" y="108" width="180" height="3" rx="1.5" fill="url(#speedLines)"/>
    <rect x="55" y="118" width="210" height="2.5" rx="1.25" fill="url(#speedLines)"/>
    <rect x="95" y="128" width="170" height="3" rx="1.5" fill="url(#speedLines)"/>
    <rect x="65" y="138" width="200" height="2" rx="1" fill="url(#speedLines)"/>
    <rect x="85" y="148" width="180" height="3" rx="1.5" fill="url(#speedLines)"/>
    <rect x="50" y="158" width="215" height="2.5" rx="1.25" fill="url(#speedLines)"/>
    <rect x="100" y="168" width="165" height="2" rx="1" fill="url(#speedLines)"/>
    <rect x="70" y="178" width="195" height="3" rx="1.5" fill="url(#speedLines)"/>
    <rect x="90" y="188" width="175" height="2.5" rx="1.25" fill="url(#speedLines)"/>
    <rect x="60" y="198" width="205" height="2" rx="1" fill="url(#speedLines)"/>
    <rect x="80" y="208" width="185" height="3" rx="1.5" fill="url(#speedLines)"/>
    <rect x="55" y="218" width="210" height="2" rx="1" fill="url(#speedLines)"/>
    <rect x="95" y="228" width="170" height="2.5" rx="1.25" fill="url(#speedLines)"/>
    <rect x="70" y="238" width="195" height="2" rx="1" fill="url(#speedLines)"/>
  </g>

  <!-- === F1 CAR (top-down view) === -->
  <g transform="translate(390, 170) scale(1.15)" filter="url(#redShadow)">
    <!-- Rear wing -->
    <rect x="-110" y="-28" width="8" height="56" rx="2" fill="#333"/>
    <rect x="-108" y="-25" width="4" height="50" rx="1" fill="#E8002D"/>

    <!-- Rear diffuser -->
    <path d="M-102,-24 L-95,-22 L-95,22 L-102,24 Z" fill="#2A2A2A"/>

    <!-- Rear body -->
    <path d="M-95,-22 L-50,-17 L-50,17 L-95,22 Z" fill="#E8002D"/>
    <path d="M-90,-20 L-52,-16 L-52,16 L-90,20 Z" fill="#CC0000"/>

    <!-- Engine cover -->
    <path d="M-50,-17 L5,-12 L5,12 L-50,17 Z" fill="#E8002D"/>
    <path d="M-48,-15.5 L3,-11 L3,11 L-48,15.5 Z" fill="#CC0000"/>
    <!-- Air intake (shark fin) -->
    <rect x="-40" y="-2" width="35" height="4" rx="1" fill="#AA0020"/>

    <!-- Sidepods -->
    <path d="M-35,-22 L10,-18 L10,-14 L-35,-17 Z" fill="#B00020" opacity="0.9"/>
    <path d="M-35,22 L10,18 L10,14 L-35,17 Z" fill="#B00020" opacity="0.9"/>

    <!-- Cockpit/halo area -->
    <path d="M5,-12 L45,-9 L45,9 L5,12 Z" fill="#1A1A1A"/>
    <ellipse cx="25" cy="0" rx="16" ry="7.5" fill="#111" stroke="#333" stroke-width="0.8"/>
    <!-- Driver helmet -->
    <ellipse cx="25" cy="0" rx="5.5" ry="4.5" fill="#E8002D"/>
    <ellipse cx="27" cy="-1" rx="2.5" ry="2" fill="#FF3355" opacity="0.5"/>

    <!-- Nose -->
    <path d="M45,-9 L95,-4 L102,0 L95,4 L45,9 Z" fill="#E8002D"/>
    <path d="M47,-8 L93,-3.5 L99,0 L93,3.5 L47,8 Z" fill="#CC0000"/>

    <!-- Front wing -->
    <rect x="95" y="-30" width="5" height="60" rx="2" fill="#444"/>
    <rect x="97" y="-28" width="2.5" height="56" rx="1" fill="#BBB"/>
    <!-- Front wing endplates -->
    <rect x="93" y="-32" width="10" height="5" rx="1" fill="#E8002D"/>
    <rect x="93" y="27" width="10" height="5" rx="1" fill="#E8002D"/>

    <!-- Rear wheels -->
    <ellipse cx="-78" cy="-30" rx="14" ry="8" fill="#1A1A1A" stroke="#333" stroke-width="0.5"/>
    <ellipse cx="-78" cy="30" rx="14" ry="8" fill="#1A1A1A" stroke="#333" stroke-width="0.5"/>
    <ellipse cx="-78" cy="-30" rx="8" ry="5" fill="#2A2A2A"/>
    <ellipse cx="-78" cy="30" rx="8" ry="5" fill="#2A2A2A"/>

    <!-- Front wheels -->
    <ellipse cx="72" cy="-23" rx="12" ry="7" fill="#1A1A1A" stroke="#333" stroke-width="0.5"/>
    <ellipse cx="72" cy="23" rx="12" ry="7" fill="#1A1A1A" stroke="#333" stroke-width="0.5"/>
    <ellipse cx="72" cy="-23" rx="7" ry="4.5" fill="#2A2A2A"/>
    <ellipse cx="72" cy="23" rx="7" ry="4.5" fill="#2A2A2A"/>

    <!-- White center stripe -->
    <rect x="-95" y="-1.5" width="190" height="3" rx="1" fill="white" opacity="0.5"/>
  </g>

  <!-- === "FF" TEXT (RED, bold italic) === -->
  <g filter="url(#glow)">
    <text x="155" y="290" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="170" fill="url(#redGrad)" font-style="italic" letter-spacing="-12">FF</text>
  </g>

  <!-- === "1" TEXT (WHITE, bold italic) === -->
  <g filter="url(#glow)">
    <text x="480" y="290" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="170" fill="white" font-style="italic">1</text>
  </g>

  <!-- Red accent line -->
  <rect x="155" y="302" width="420" height="5" rx="2.5" fill="url(#redGrad)"/>

  <!-- === SUBTITLE === -->
  <text x="400" y="345" text-anchor="middle" font-family="'Arial', 'Helvetica', sans-serif" font-weight="800" font-size="22" letter-spacing="10" fill="#999">
    FANTASY FORMULA 1 WEBAPP
  </text>
</svg>
